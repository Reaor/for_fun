name: 部署字宙到 GitHub Pages

# Pages 站点源为 gh-pages 分支；main 有更新时自动同步过去
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 同步 main 到 gh-pages
        run: git push origin HEAD:gh-pages --force
